<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, shrink-to-fit=no">
    <title>ProExpense | Smart Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #111118;
            --surface2: #1a1a24;
            --surface3: #22222f;
            --border: rgba(255,255,255,0.07);
            --border2: rgba(255,255,255,0.12);
            --accent: #7c6af7;
            --accent2: #a78bfa;
            --accent-glow: rgba(124,106,247,0.25);
            --green: #34d399;
            --green-dim: rgba(52,211,153,0.12);
            --red: #f87171;
            --red-dim: rgba(248,113,113,0.12);
            --text: #f0f0f8;
            --text2: #9090b0;
            --text3: #5a5a7a;
            --radius: 16px;
            --radius-sm: 10px;
            --radius-xs: 7px;
            --shadow: 0 24px 48px rgba(0,0,0,0.5);
            --font: 'Sora', sans-serif;
            --mono: 'JetBrains Mono', monospace;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html { height: 100%; }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            overflow: auto;
            -webkit-tap-highlight-color: transparent;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(124,106,247,0.12) 0%, transparent 70%);
            top: -200px; left: -150px;
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(52,211,153,0.06) 0%, transparent 70%);
            bottom: -150px; right: -100px;
            pointer-events: none;
            z-index: 0;
        }

        /* ── App Shell ── */
        .app {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            height: 94vh;
            max-height: 900px;
            min-height: 580px;
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: var(--shadow), 0 0 0 1px rgba(255,255,255,0.03) inset;
        }

        /* ── MOBILE FULLSCREEN ── */
        @media (max-width: 899px) {
            html, body {
                height: 100%;
                min-height: 100%;
                overflow: hidden;
                padding: 0;
            }
            body {
                align-items: stretch;
                justify-content: stretch;
            }
            .app {
                max-width: 100%;
                width: 100%;
                height: 100%;
                max-height: 100%;
                min-height: 100%;
                border-radius: 0;
                border: none;
                box-shadow: none;
            }
        }

        /* ── Header ── */
        .header {
            padding: 18px 20px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            background: var(--surface);
        }

        /* Safe area support for notched phones */
        @media (max-width: 899px) {
            .header {
                padding-top: max(18px, env(safe-area-inset-top, 18px));
                padding-left: max(20px, env(safe-area-inset-left, 20px));
                padding-right: max(20px, env(safe-area-inset-right, 20px));
            }
            .app-footer {
                padding-bottom: max(10px, env(safe-area-inset-bottom, 10px));
            }
            .list-scroll {
                padding-bottom: max(90px, calc(70px + env(safe-area-inset-bottom, 0px))) !important;
            }
            .fab {
                bottom: max(20px, calc(16px + env(safe-area-inset-bottom, 0px))) !important;
                right: max(20px, env(safe-area-inset-right, 20px)) !important;
            }
        }

        .logo-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--accent), #5b4de0);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px var(--accent-glow);
            flex-shrink: 0;
        }

        .logo-icon i { color: #fff; font-size: 16px; }

        .logo-text h1 {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: var(--text);
        }
        .logo-text p {
            font-size: 10px;
            color: var(--text3);
            font-weight: 400;
            letter-spacing: 0.4px;
            margin-top: 1px;
        }

        /* ── Balance Hero ── */
        .balance-section {
            padding: 20px 20px 16px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            position: relative;
        }

        .balance-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text3);
            margin-bottom: 8px;
        }

        .balance-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        #balance {
            font-family: var(--mono);
            font-size: clamp(22px, 5vw, 32px);
            font-weight: 600;
            letter-spacing: -1px;
            color: var(--text);
            line-height: 1;
            transition: opacity 0.3s;
            white-space: nowrap;
        }

        .eye-btn {
            width: 32px; height: 32px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            color: var(--text3);
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .eye-btn:hover { background: var(--surface3); color: var(--text2); border-color: var(--border2); }
        .eye-btn i { font-size: 13px; }

        .summary-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .summary-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 11px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: border-color 0.2s;
            min-width: 0;
        }
        .summary-card:hover { border-color: var(--border2); }

        .summary-icon {
            width: 36px; height: 36px;
            border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .summary-icon.green { background: var(--green-dim); }
        .summary-icon.red { background: var(--red-dim); }
        .summary-icon.green i { color: var(--green); font-size: 13px; }
        .summary-icon.red i { color: var(--red); font-size: 13px; }

        .summary-info { min-width: 0; overflow: hidden; }
        .summary-info label {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            color: var(--text3);
            display: block;
            margin-bottom: 3px;
        }
        .summary-info span {
            font-family: var(--mono);
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            display: block;
        }

        /* ── Transaction List Area ── */
        .list-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            position: relative;
        }

        .list-header {
            padding: 18px 24px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .list-title {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: var(--text2);
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #history-count {
            background: var(--accent);
            color: #fff;
            font-size: 9px;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 20px;
            font-family: var(--mono);
            letter-spacing: 0;
        }

        .search-wrap {
            padding: 0 24px 14px;
            flex-shrink: 0;
        }

        .search-inner { position: relative; }

        .search-inner i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text3);
            font-size: 12px;
            pointer-events: none;
        }

        .input-field {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-family: var(--font);
            font-size: 13px;
            padding: 10px 14px 10px 38px;
            transition: all 0.2s;
            outline: none;
        }
        @media (max-width: 768px) { .input-field { font-size: 16px; } }

        .input-field::placeholder { color: var(--text3); }
        .input-field:focus {
            border-color: var(--accent);
            background: var(--surface3);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .list-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 0 24px 90px;
        }
        .list-scroll::-webkit-scrollbar { width: 3px; }
        .list-scroll::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 10px; }

        #list { list-style: none; display: flex; flex-direction: column; gap: 8px; }

        .tx-item {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            overflow: hidden;
            transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
            cursor: pointer;
            animation: itemIn 0.3s ease both;
        }
        @keyframes itemIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .tx-item:hover { border-color: var(--border2); background: var(--surface3); }

        .tx-main {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            gap: 12px;
        }

        .tx-left {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .tx-icon {
            width: 40px; height: 40px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .tx-icon.income { background: var(--green-dim); }
        .tx-icon.expense { background: var(--red-dim); }
        .tx-icon.income i { color: var(--green); font-size: 13px; }
        .tx-icon.expense i { color: var(--red); font-size: 13px; }

        .tx-info { min-width: 0; }
        .tx-info h4 {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .tx-info p {
            font-size: 10px;
            color: var(--text3);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tx-right { text-align: right; flex-shrink: 0; }
        .tx-amount {
            font-family: var(--mono);
            font-size: 14px;
            font-weight: 600;
        }
        .tx-amount.income { color: var(--green); }
        .tx-amount.expense { color: var(--red); }

        .tx-details {
            display: none;
            padding: 12px 16px 14px;
            border-top: 1px solid var(--border);
            background: rgba(0,0,0,0.15);
            animation: fadeSlideIn 0.2s ease;
        }
        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .tx-meta {
            font-size: 10px;
            color: var(--text3);
            margin-bottom: 10px;
        }

        .tx-actions { display: flex; gap: 8px; }

        .action-btn {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 6px 12px;
            border-radius: 7px;
            font-size: 11px;
            font-weight: 600;
            font-family: var(--font);
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--border);
            background: var(--surface3);
            color: var(--text2);
        }
        .action-btn:hover { border-color: var(--border2); color: var(--text); }
        .action-btn.delete { color: var(--red); }
        .action-btn.delete:hover { background: var(--red-dim); border-color: rgba(248,113,113,0.3); }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px 24px;
            text-align: center;
            gap: 12px;
        }
        .empty-state .empty-icon {
            width: 64px; height: 64px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 4px;
        }
        .empty-state .empty-icon i { font-size: 24px; color: var(--text3); }
        .empty-state h3 { font-size: 14px; font-weight: 600; color: var(--text2); }
        .empty-state p { font-size: 12px; color: var(--text3); line-height: 1.6; }

        /* ── FAB ── */
        .fab {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 52px; height: 52px;
            background: linear-gradient(135deg, var(--accent), #5b4de0);
            color: #fff;
            border: none;
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 8px 24px var(--accent-glow), 0 0 0 1px rgba(255,255,255,0.1) inset;
            transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
            z-index: 50;
        }
        .fab:hover { transform: translateY(-2px) scale(1.05); box-shadow: 0 12px 32px var(--accent-glow); }
        .fab:active { transform: scale(0.94); }

        /* ── Footer ── */
        .app-footer {
            padding: 10px 24px;
            border-top: 1px solid var(--border);
            text-align: center;
            flex-shrink: 0;
        }
        .app-footer span {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text3);
        }

        /* ── Modal ── */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 200;
            align-items: flex-end;
            justify-content: center;
            padding: 0;
        }

        @media (min-width: 480px) {
            .modal { align-items: center; padding: 20px; }
        }

        .modal-content {
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: 24px 24px 0 0;
            padding: 28px 24px 36px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 -8px 48px rgba(0,0,0,0.6);
            animation: slideUp 0.35s cubic-bezier(0.16,1,0.3,1);
            position: relative;
        }

        @media (max-width: 899px) {
            .modal-content {
                padding-bottom: max(36px, calc(24px + env(safe-area-inset-bottom, 0px)));
            }
        }

        @media (min-width: 480px) {
            .modal-content {
                border-radius: 24px;
                animation: popIn 0.3s cubic-bezier(0.16,1,0.3,1);
                padding: 28px 28px 32px;
            }
        }

        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes popIn {
            from { transform: scale(0.92); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-handle {
            width: 40px; height: 4px;
            background: var(--surface3);
            border-radius: 4px;
            margin: 0 auto 24px;
            display: block;
        }
        @media (min-width: 480px) { .modal-handle { display: none; } }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }
        #modal-title {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }
        .close-btn {
            width: 34px; height: 34px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            color: var(--text3);
            transition: all 0.2s;
        }
        .close-btn:hover { background: var(--surface3); color: var(--text); border-color: var(--border2); }
        .close-btn i { font-size: 14px; }

        .form-group { margin-bottom: 16px; }

        .form-label {
            display: block;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text3);
            margin-bottom: 6px;
        }

        .form-control {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-family: var(--font);
            font-size: 14px;
            padding: 12px 14px;
            transition: all 0.2s;
            outline: none;
            appearance: none;
        }
        @media (max-width: 768px) { .form-control { font-size: 16px; } }
        .form-control::placeholder { color: var(--text3); }
        .form-control:focus {
            border-color: var(--accent);
            background: var(--surface3);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .form-control option { background: var(--surface2); }

        .select-wrap { position: relative; }
        .select-field { padding-right: 36px; cursor: pointer; }
        .select-chevron {
            position: absolute;
            right: 13px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 11px;
            color: var(--text3);
            pointer-events: none;
            transition: transform 0.2s ease, color 0.2s;
        }
        .select-field:focus ~ .select-chevron {
            transform: translateY(-50%) rotate(180deg);
            color: var(--accent);
        }

        .type-toggle {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 16px;
        }
        .type-option {
            padding: 12px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--surface2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text3);
            transition: all 0.2s;
            user-select: none;
        }
        .type-option:hover { border-color: var(--border2); }
        .type-option.active-income {
            background: var(--green-dim);
            border-color: rgba(52,211,153,0.35);
            color: var(--green);
        }
        .type-option.active-expense {
            background: var(--red-dim);
            border-color: rgba(248,113,113,0.35);
            color: var(--red);
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent), #5b4de0);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-family: var(--font);
            font-size: 14px;
            font-weight: 700;
            padding: 14px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
            letter-spacing: 0.2px;
            box-shadow: 0 4px 20px var(--accent-glow);
        }
        .submit-btn:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 8px 28px var(--accent-glow); }
        .submit-btn:active { transform: scale(0.98); }

        /* ── Delete Modal ── */
        .delete-modal-content {
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: 24px 24px 0 0;
            padding: 32px 28px 40px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            animation: slideUp 0.35s cubic-bezier(0.16,1,0.3,1);
        }
        @media (max-width: 899px) {
            .delete-modal-content {
                padding-bottom: max(40px, calc(28px + env(safe-area-inset-bottom, 0px)));
            }
        }
        @media (min-width: 480px) {
            .delete-modal-content {
                border-radius: 24px;
                animation: popIn 0.3s cubic-bezier(0.16,1,0.3,1);
            }
        }
        .delete-icon-wrap {
            width: 64px; height: 64px;
            background: var(--red-dim);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
        }
        .delete-icon-wrap i { color: var(--red); font-size: 28px; }
        .delete-modal-content h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
        .delete-modal-content p { font-size: 13px; color: var(--text3); line-height: 1.6; margin-bottom: 24px; }

        .delete-btns { display: flex; gap: 10px; }
        .btn-cancel {
            flex: 1;
            padding: 12px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border2);
            background: var(--surface2);
            color: var(--text2);
            font-family: var(--font);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-cancel:hover { background: var(--surface3); }
        .btn-danger {
            flex: 1;
            padding: 12px;
            border-radius: var(--radius-sm);
            border: none;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: #fff;
            font-family: var(--font);
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 16px rgba(239,68,68,0.3);
        }
        .btn-danger:hover { opacity: 0.9; }

        /* ── Toast ── */
        .toast-container {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }

        .toast {
            background: var(--surface);
            border: 1px solid var(--border2);
            color: var(--text);
            padding: 12px 20px;
            border-radius: 12px;
            box-shadow: 0 16px 40px rgba(0,0,0,0.5);
            opacity: 0;
            transform: translateY(12px) scale(0.95);
            transition: all 0.4s cubic-bezier(0.16,1,0.3,1);
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
        }
        .toast.show { opacity: 1; transform: translateY(0) scale(1); }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 10px; }

        .left-panel {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
        }

        /* ── PC Wide Layout ── */
        @media (min-width: 900px) {
            body { overflow: auto; align-items: center; padding: 24px; }
            .app {
                max-width: 960px;
                flex-direction: row;
                height: 88vh;
                max-height: 780px;
                min-height: 580px;
            }

            .left-panel {
                width: 380px;
                flex-shrink: 0;
                display: flex;
                flex-direction: column;
                border-right: 1px solid var(--border);
            }
            .left-panel .header { border-bottom: 1px solid var(--border); }
            .left-panel .balance-section {
                flex: 1;
                border-bottom: none;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }

            .left-panel .summary-row {
                grid-template-columns: 1fr;
                gap: 10px;
            }
            .left-panel .summary-info span { font-size: 15px; }

            .right-panel {
                flex: 1;
                display: flex;
                flex-direction: column;
                min-width: 0;
            }
        }

        /* ── Theme Toggle ── */
        .theme-btn {
            width: 34px; height: 34px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            color: var(--text3);
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .theme-btn:hover { background: var(--surface3); color: var(--text); border-color: var(--border2); }
        .theme-btn i { font-size: 14px; transition: transform 0.4s ease; }
        .theme-btn:hover i { transform: rotate(20deg); }

        /* ── Light Theme ── */
        body.light {
            --bg: #f0f2f8;
            --surface: #ffffff;
            --surface2: #f4f6fb;
            --surface3: #e8ecf4;
            --border: rgba(0,0,0,0.08);
            --border2: rgba(0,0,0,0.14);
            --accent: #6355e8;
            --accent2: #7c6af7;
            --accent-glow: rgba(99,85,232,0.2);
            --green: #059669;
            --green-dim: rgba(5,150,105,0.1);
            --red: #dc2626;
            --red-dim: rgba(220,38,38,0.1);
            --text: #0f1117;
            --text2: #4a4a6a;
            --text3: #8888aa;
            --shadow: 0 24px 48px rgba(0,0,0,0.12);
        }
        body.light::before { background: radial-gradient(circle, rgba(99,85,232,0.07) 0%, transparent 70%); }
        body.light::after  { background: radial-gradient(circle, rgba(5,150,105,0.05) 0%, transparent 70%); }
        body.light .app { box-shadow: var(--shadow), 0 0 0 1px rgba(255,255,255,0.8) inset; }
        body.light .logo-icon { box-shadow: 0 0 16px rgba(99,85,232,0.25); }
        body.light .fab { box-shadow: 0 8px 20px rgba(99,85,232,0.3); }
        body.light .submit-btn { box-shadow: 0 4px 16px rgba(99,85,232,0.25); }
    </style>
</head>
<body>

<div class="app" id="app-root">
    <div class="left-panel" id="left-panel">
        <div class="header">
            <div class="logo-wrap">
                <div class="logo-icon">
                    <i class="fa-solid fa-wallet"></i>
                </div>
                <div class="logo-text">
                    <h1>ProExpense</h1>
                    <p>Smart Financial Tracker</p>
                </div>
            </div>
            <button class="theme-btn" id="theme-toggle-btn" title="Toggle Light/Dark">
                <i class="fa-solid fa-moon" id="theme-icon"></i>
            </button>
        </div>

        <div class="balance-section">
            <p class="balance-label">Total Balance</p>
            <div class="balance-row">
                <span id="balance">₹0.00</span>
                <button class="eye-btn" id="toggle-balance-btn">
                    <i id="toggle-balance-icon" class="fa-solid fa-eye"></i>
                </button>
            </div>
            <div class="summary-row">
                <div class="summary-card">
                    <div class="summary-icon green">
                        <i class="fa-solid fa-arrow-trend-up"></i>
                    </div>
                    <div class="summary-info">
                        <label>Income</label>
                        <span id="money-plus">₹0.00</span>
                    </div>
                </div>
                <div class="summary-card">
                    <div class="summary-icon red">
                        <i class="fa-solid fa-arrow-trend-down"></i>
                    </div>
                    <div class="summary-info">
                        <label>Expense</label>
                        <span id="money-minus">₹0.00</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="list-area right-panel" id="right-panel">
        <div class="list-header">
            <span class="list-title">
                Transactions
                <span id="history-count">0</span>
            </span>
        </div>

        <div class="search-wrap">
            <div class="search-inner">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="search-input" class="input-field" placeholder="Search transactions…">
            </div>
        </div>

        <div class="list-scroll">
            <ul id="list"></ul>
        </div>

        <button class="fab" id="fab" title="Add Transaction">
            <i class="fa-solid fa-plus"></i>
        </button>

        <div class="app-footer">
            <span>Powered by ❤️ Falendra Sahu</span>
        </div>
    </div>
</div>

<!-- Add / Edit Modal -->
<div class="modal" id="transaction-modal">
    <div class="modal-content">
        <span class="modal-handle"></span>
        <div class="modal-header">
            <h3 id="modal-title">New Record</h3>
            <button class="close-btn" id="close-modal"><i class="fa-solid fa-xmark"></i></button>
        </div>

        <form id="form">
            <div style="margin-bottom:4px;">
                <span class="form-label">Type</span>
            </div>
            <div class="type-toggle">
                <label class="type-option active-income" id="opt-income">
                    <i class="fa-solid fa-arrow-trend-up"></i> Income
                    <input type="radio" name="type-radio" value="wealth" style="display:none" checked>
                </label>
                <label class="type-option" id="opt-expense">
                    <i class="fa-solid fa-arrow-trend-down"></i> Expense
                    <input type="radio" name="type-radio" value="expense" style="display:none">
                </label>
            </div>

            <select id="type" style="display:none">
                <option value="wealth">Income</option>
                <option value="expense">Expense</option>
            </select>

            <div id="source-container" style="display:none" class="form-group">
                <label class="form-label" for="expense-source">Deduct From</label>
                <div class="select-wrap">
                    <select id="expense-source" class="form-control select-field"></select>
                    <i class="fa-solid fa-chevron-down select-chevron"></i>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="text">Description</label>
                <input type="text" id="text" class="form-control" placeholder="e.g., Groceries, Salary…" autocomplete="off">
            </div>

            <div class="form-group">
                <label class="form-label" for="amount-display">Amount (₹)</label>
                <input type="text" id="amount-display" class="form-control" placeholder="0.00" autocomplete="off" inputmode="decimal">
                <input type="hidden" id="amount">
            </div>

            <button type="submit" class="submit-btn" id="submit-btn">Save Transaction</button>
        </form>
    </div>
</div>

<!-- Delete Confirm Modal -->
<div class="modal" id="delete-modal">
    <div class="delete-modal-content">
        <span class="modal-handle"></span>
        <div class="delete-icon-wrap">
            <i class="fa-solid fa-triangle-exclamation"></i>
        </div>
        <h3>Delete Record?</h3>
        <p>This action cannot be undone. The transaction will be permanently removed.</p>
        <div class="delete-btns">
            <button class="btn-cancel" id="cancel-delete-btn">Cancel</button>
            <button class="btn-danger" id="confirm-delete-btn">Delete</button>
        </div>
    </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-analytics.js";
    import { getDatabase, ref, onValue, push, set, update, remove } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCPXncg-QmqDketytNT9V7Ac_4DYBzFOZM",
        authDomain: "expense-tracker-6175c.firebaseapp.com",
        databaseURL: "https://expense-tracker-6175c-default-rtdb.firebaseio.com",
        projectId: "expense-tracker-6175c",
        storageBucket: "expense-tracker-6175c.firebasestorage.app",
        messagingSenderId: "812043413259",
        appId: "1:812043413259:web:5474fe7e9993c299a8a40e",
        measurementId: "G-MSE28782V0"
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const db = getDatabase(app);

    const balance        = document.getElementById('balance');
    const money_plus     = document.getElementById('money-plus');
    const money_minus    = document.getElementById('money-minus');
    const list           = document.getElementById('list');
    const form           = document.getElementById('form');
    const text           = document.getElementById('text');
    const amount         = document.getElementById('amount');
    const typeSelect     = document.getElementById('type');
    const sourceContainer= document.getElementById('source-container');
    const expenseSource  = document.getElementById('expense-source');
    const submitBtn      = document.getElementById('submit-btn');
    const modal          = document.getElementById('transaction-modal');
    const fab            = document.getElementById('fab');
    const closeModal     = document.getElementById('close-modal');
    const modalTitle     = document.getElementById('modal-title');
    const historyCount   = document.getElementById('history-count');
    const toggleBalBtn   = document.getElementById('toggle-balance-btn');
    const toggleBalIcon  = document.getElementById('toggle-balance-icon');
    const deleteModal    = document.getElementById('delete-modal');
    const cancelDeleteBtn= document.getElementById('cancel-delete-btn');
    const confirmDeleteBtn= document.getElementById('confirm-delete-btn');
    const searchInput    = document.getElementById('search-input');
    const optIncome      = document.getElementById('opt-income');
    const optExpense     = document.getElementById('opt-expense');

    let editId = null, deleteId = null;
    let isBalanceHidden = false, currentTotalBalance = 0;
    let transactions = JSON.parse(localStorage.getItem('cachedTransactions')) || [];
    renderApp();

    const transRef = ref(db, 'transactions');
    onValue(transRef, (snap) => {
        const data = snap.val();
        transactions = [];
        if (data) for (const [k,v] of Object.entries(data)) transactions.push({ id: k, ...v });
        localStorage.setItem('cachedTransactions', JSON.stringify(transactions));
        renderApp();
    });

    searchInput.addEventListener('input', renderList);

    const amountDisplay = document.getElementById('amount-display');

    amountDisplay.addEventListener('input', () => {
        let raw = amountDisplay.value.replace(/[^0-9.]/g, '');
        const parts = raw.split('.');
        if (parts.length > 2) raw = parts[0] + '.' + parts.slice(1).join('');
        const intPart = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        const formatted = parts.length === 2 ? intPart + '.' + (parts[1] || '') : intPart;
        amountDisplay.value = formatted;
        amount.value = raw;
    });

    amountDisplay.addEventListener('paste', () => setTimeout(() => amountDisplay.dispatchEvent(new Event('input')), 0));
    optIncome.addEventListener('click', () => setType('wealth'));
    optExpense.addEventListener('click', () => setType('expense'));

    function setType(val) {
        typeSelect.value = val;
        optIncome.className = 'type-option' + (val === 'wealth' ? ' active-income' : '');
        optExpense.className = 'type-option' + (val === 'expense' ? ' active-expense' : '');
        if (val === 'expense') { populateSources(); sourceContainer.style.display = 'block'; }
        else { sourceContainer.style.display = 'none'; }
    }

    function formatINR(n) {
        return new Intl.NumberFormat('en-IN', { style:'currency', currency:'INR', minimumFractionDigits:2, maximumFractionDigits:2 }).format(n);
    }

    function getFormattedDate() {
        const now = new Date();
        const d = String(now.getDate()).padStart(2,'0');
        const mo = String(now.getMonth()+1).padStart(2,'0');
        const yr = now.getFullYear();
        let h = now.getHours();
        const mi = String(now.getMinutes()).padStart(2,'0');
        const ampm = h >= 12 ? 'PM' : 'AM';
        h = h % 12 || 12;
        return `${d}-${mo}-${yr}, ${String(h).padStart(2,'0')}:${mi} ${ampm}`;
    }

    function showToast(msg, icon='fa-check-circle', color='#34d399') {
        const c = document.getElementById('toast-container');
        const t = document.createElement('div');
        t.className = 'toast';
        t.innerHTML = `<i class="fa-solid ${icon}" style="color:${color};font-size:15px"></i> ${msg}`;
        c.appendChild(t);
        setTimeout(() => t.classList.add('show'), 10);
        setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 400); }, 3000);
    }

    function populateSources(selectedId = null) {
        expenseSource.innerHTML = '';
        const incomes = transactions.filter(t => t.type === 'wealth');
        if (!incomes.length) {
            const o = document.createElement('option');
            o.value = ''; o.innerText = 'No income sources available'; o.disabled = true; o.selected = true;
            expenseSource.appendChild(o); return;
        }
        incomes.forEach(inc => {
            const deducted = transactions.filter(t => t.type==='expense' && t.sourceId===inc.id).reduce((a,b) => a+b.amount, 0);
            const remaining = inc.amount - deducted;
            const o = document.createElement('option');
            o.value = inc.id;
            o.innerText = `${inc.text} (Avail: ${formatINR(remaining)})`;
            if (inc.id === selectedId) o.selected = true;
            expenseSource.appendChild(o);
        });
    }

    function getSourceName(id) {
        const s = transactions.find(t => t.id === id);
        return s ? s.text : 'Unknown';
    }

    function openModal(title='New Record', btnText='Save Transaction') {
        modalTitle.innerText = title;
        submitBtn.innerText = btnText;
        modal.style.display = 'flex';
    }

    function closeAndResetModal() {
        modal.style.display = 'none';
        editId = null;
        text.value = ''; amount.value = ''; amountDisplay.value = '';
        setType('wealth');
    }

    function closeDeleteModal() {
        deleteModal.style.display = 'none';
        deleteId = null;
    }

    fab.addEventListener('click', () => { closeAndResetModal(); openModal(); });
    closeModal.addEventListener('click', closeAndResetModal);
    cancelDeleteBtn.addEventListener('click', closeDeleteModal);
    window.addEventListener('click', (e) => {
        if (e.target === modal) closeAndResetModal();
        if (e.target === deleteModal) closeDeleteModal();
    });

    toggleBalBtn.addEventListener('click', () => {
        isBalanceHidden = !isBalanceHidden;
        if (isBalanceHidden) {
            toggleBalIcon.classList.replace('fa-eye','fa-eye-slash');
            balance.innerText = '₹ • • • • • •';
        } else {
            toggleBalIcon.classList.replace('fa-eye-slash','fa-eye');
            balance.innerText = formatINR(currentTotalBalance);
        }
    });

    function addTransaction(e) {
        e.preventDefault();
        if (!amount.value.trim()) { showToast('Please provide an amount.','fa-triangle-exclamation','#f59e0b'); return; }
        let sourceIdValue = null;
        if (typeSelect.value === 'expense') {
            if (!expenseSource.value) { showToast('Please select a source.','fa-triangle-exclamation','#f59e0b'); return; }
            sourceIdValue = expenseSource.value;
        }
        const txText = text.value.trim() || 'Unknown';
        const now = getFormattedDate();

        if (editId) {
            const existing = transactions.find(t => t.id === editId);
            update(ref(db, `transactions/${editId}`), {
                text: txText, amount: +amount.value, type: typeSelect.value,
                sourceId: sourceIdValue, createdAt: existing.createdAt, updatedAt: now
            });
            showToast('Updated successfully');
        } else {
            set(push(ref(db, 'transactions')), {
                text: txText, amount: +amount.value, type: typeSelect.value,
                sourceId: sourceIdValue, createdAt: now, updatedAt: null
            });
            showToast('Transaction saved');
        }
        closeAndResetModal();
    }

    window.toggleDetails = function(id) {
        const el = document.getElementById(`details-${id}`);
        const isOpen = el.style.display === 'block';
        document.querySelectorAll('.tx-details').forEach(d => d.style.display = 'none');
        el.style.display = isOpen ? 'none' : 'block';
    };

    function addTransactionDOM(tx) {
        const isExp = tx.type === 'expense';
        let displayAmount = tx.amount;
        if (!isExp) {
            const deducted = transactions.filter(t => t.type==='expense' && t.sourceId===tx.id).reduce((a,b) => a+b.amount, 0);
            displayAmount = tx.amount - deducted;
        }
        const sign = isExp ? '−' : '+';
        const typeClass = isExp ? 'expense' : 'income';
        const iconClass = isExp ? 'fa-arrow-trend-down' : 'fa-arrow-trend-up';
        const createdStr = tx.createdAt || '';
        const updatedStr = tx.updatedAt ? ` · Edited ${tx.updatedAt}` : '';
        const sourceTag = isExp && tx.sourceId ? ` · From: ${getSourceName(tx.sourceId)}` : '';

        const item = document.createElement('li');
        item.className = 'tx-item';
        item.innerHTML = `
            <div class="tx-main" onclick="toggleDetails('${tx.id}')">
                <div class="tx-left">
                    <div class="tx-icon ${typeClass}"><i class="fa-solid ${iconClass}"></i></div>
                    <div class="tx-info">
                        <h4>${tx.text}</h4>
                        <p>${createdStr}${sourceTag}</p>
                    </div>
                </div>
                <div class="tx-right">
                    <span class="tx-amount ${typeClass}">${sign}${formatINR(Math.abs(displayAmount))}</span>
                </div>
            </div>
            <div id="details-${tx.id}" class="tx-details">
                <div class="tx-meta"><i class="fa-regular fa-clock" style="margin-right:4px"></i>${createdStr}${updatedStr}</div>
                <div class="tx-actions">
                    <button class="action-btn" onclick="editTransaction('${tx.id}',event)"><i class="fa-solid fa-pen" style="font-size:10px"></i> Edit</button>
                    <button class="action-btn delete" onclick="removeTransaction('${tx.id}',event)"><i class="fa-solid fa-trash-can" style="font-size:10px"></i> Delete</button>
                </div>
            </div>
        `;
        list.prepend(item);
    }

    window.editTransaction = function(id, e) {
        e.stopPropagation();
        const tx = transactions.find(t => t.id === id);
        if (!tx) return;
        text.value = tx.text === 'Unknown' ? '' : tx.text;
        amount.value = tx.amount;
        const num = parseFloat(tx.amount);
        const intPart = Math.floor(num).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        const dec = (num % 1).toFixed(2).slice(1);
        amountDisplay.value = intPart + dec;
        setType(tx.type);
        if (tx.type === 'expense') { populateSources(tx.sourceId); sourceContainer.style.display = 'block'; }
        editId = id;
        openModal('Update Record', 'Save Changes');
    };

    window.removeTransaction = function(id, e) {
        e.stopPropagation();
        deleteId = id;
        deleteModal.style.display = 'flex';
    };

    confirmDeleteBtn.addEventListener('click', () => {
        if (deleteId) {
            remove(ref(db, `transactions/${deleteId}`));
            showToast('Deleted', 'fa-trash-can', '#f87171');
            if (editId === deleteId) closeAndResetModal();
            closeDeleteModal();
        }
    });

    function updateValues() {
        const wealth = transactions.filter(t => t.type === 'wealth').reduce((a,b) => a+b.amount, 0);
        const expense = transactions.filter(t => t.type === 'expense').reduce((a,b) => a+b.amount, 0);
        currentTotalBalance = wealth - expense;
        balance.innerText = isBalanceHidden ? '₹ • • • • • •' : formatINR(currentTotalBalance);
        money_plus.innerText = formatINR(wealth);
        money_minus.innerText = formatINR(expense);
        historyCount.innerText = transactions.length;
    }

    function renderList() {
        list.innerHTML = '';
        const q = searchInput.value.toLowerCase().trim();
        const filtered = transactions.filter(t => t.text.toLowerCase().includes(q));
        if (!filtered.length) {
            list.innerHTML = `<div class="empty-state">
                <div class="empty-icon"><i class="fa-solid fa-receipt"></i></div>
                <h3>${q ? 'No results found' : 'No transactions yet'}</h3>
                <p>${q ? 'Try a different search term.' : 'Tap the + button to add your first transaction.'}</p>
            </div>`;
            return;
        }
        filtered.forEach(addTransactionDOM);
    }

    function renderApp() { renderList(); updateValues(); }
    form.addEventListener('submit', addTransaction);

    const themeBtn  = document.getElementById('theme-toggle-btn');
    const themeIcon = document.getElementById('theme-icon');
    const savedTheme = localStorage.getItem('peTheme') || 'dark';
    if (savedTheme === 'light') {
        document.body.classList.add('light');
        themeIcon.className = 'fa-solid fa-sun';
    }
    themeBtn.addEventListener('click', () => {
        const isLight = document.body.classList.toggle('light');
        themeIcon.className = isLight ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
        localStorage.setItem('peTheme', isLight ? 'light' : 'dark');
    });
</script>
</body>
</html>
